# Full hosted stack (blueprint §10): Postgres + MCP server (HTTP) + agent worker.
# Usage:  docker compose -f docker-compose.prod.yml up -d --build
#
# Postgres stays on the internal network (not published); the MCP server is exposed
# on :8000 over streamable-http. Put a TLS-terminating reverse proxy in front for HTTPS.

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: diaspora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diaspora}
      POSTGRES_DB: diaspora
    volumes:
      - diaspora_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diaspora -d diaspora"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: .
    restart: unless-stopped
    # `default` reaches db/worker; `caterbid` lets the shared front nginx (catering-bid_web) proxy
    # this app over HTTPS. The external network must already exist (created by the caterbid stack).
    networks: [default, caterbid]
    environment:
      # Password passed as a part (URL-encoded in code) so any characters are safe.
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diaspora}
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      # Real semantic search by default (fastembed is in the image). Set hashing if RAM is tight.
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fastembed}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Apply migrations (idempotent) then serve.
    command: sh -c "python -m indo_usa_mcp.cli init-db && python -m indo_usa_mcp.server"

  worker:
    build: .
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diaspora}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fastembed}
      EVENT_ICAL_FEEDS: ${EVENT_ICAL_FEEDS:-}
      # caterbid.co import (operator's own data, same VPS). Blank = disabled. CATERBID_QUERY blank
      # = use the built-in default SELECT; set it only if caterbid's schema differs (see config.py).
      CATERBID_DATABASE_URL: ${CATERBID_DATABASE_URL:-}
      CATERBID_QUERY: ${CATERBID_QUERY:-}
      # Outreach (OutreachAgent runs here). Auto-send stays OFF until SMTP *and*
      # OUTREACH_POSTAL_ADDRESS are set (CAN-SPAM); otherwise it only drafts.
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me}      # signs one-click opt-out links
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-http://localhost:8080}  # base for the opt-out link
      CLAIM_BASE_URL: ${CLAIM_BASE_URL:-https://yourdomain.com/claim}
      PLATFORM_NAME: ${PLATFORM_NAME:-Indian Eats Directory}
      OUTREACH_CONTACT_EMAIL: ${OUTREACH_CONTACT_EMAIL:-}
      OUTREACH_POSTAL_ADDRESS: ${OUTREACH_POSTAL_ADDRESS:-}
      OUTREACH_DAILY_SEND_CAP: ${OUTREACH_DAILY_SEND_CAP:-15}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_started
    # Scheduler loop runs the agents (scrape -> clean -> monitor ...) on their intervals.
    command: python -m indo_usa_mcp.agents.scheduler

  # Owner-facing claim web page (blueprint §7), served on :8080.
  web:
    build: .
    restart: unless-stopped
    networks: [default, caterbid]      # joined to the shared front nginx network for HTTPS
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diaspora}
      CLAIM_BASE_URL: ${CLAIM_BASE_URL:-https://namasteamerica.us/claim}
      PLATFORM_NAME: ${PLATFORM_NAME:-Namaste America}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-https://namasteamerica.us}
      # Human chatbot (/chat). Default = free no-LLM semantic search ($0). For a real bot pick a
      # preset and add a key: LLM_PROVIDER=groq + LLM_API_KEY=<free Groq key> (fast, free), or
      # LLM_PROVIDER=ollama (self-hosted via the `llm` profile below, $0 but slow on CPU).
      # NOTE: leave LLM_BASE_URL/LLM_MODEL BLANK for a preset — the preset fills them. Set them
      # only for LLM_PROVIDER=llm (fully custom) or to override a preset's default model.
      CHAT_ENABLED: ${CHAT_ENABLED:-true}
      LLM_PROVIDER: ${LLM_PROVIDER:-search}
      LLM_API_KEY: ${LLM_API_KEY:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_USE_TOOLS: ${LLM_USE_TOOLS:-false}
      # Admin dashboard + owner portal sessions (set these to enable /admin).
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me}
      REPORT_EMAIL: ${REPORT_EMAIL:-}
      # SMTP (shared with outreach) — also used for the daily report + magic-links.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      OUTREACH_CONTACT_EMAIL: ${OUTREACH_CONTACT_EMAIL:-}
      OUTREACH_POSTAL_ADDRESS: ${OUTREACH_POSTAL_ADDRESS:-}
      OUTREACH_DAILY_SEND_CAP: ${OUTREACH_DAILY_SEND_CAP:-15}
      # Stripe (optional): blank = manual featuring; set these to enable paid upgrades.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_CENTS: ${STRIPE_PRICE_CENTS:-3000}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}
      FEATURED_DAYS: ${FEATURED_DAYS:-30}
      # Selling Featured stays OFF until a city+vertical has traffic (Stripe plumbing intact).
      FEATURED_SALES_ENABLED: ${FEATURED_SALES_ENABLED:-false}
      # Agent metering (charge agents for retrieval) — DORMANT. Flip on later; see SCALING.md.
      AGENT_METERING_ENABLED: ${AGENT_METERING_ENABLED:-false}
      AGENT_FREE_MONTHLY_QUOTA: ${AGENT_FREE_MONTHLY_QUOTA:-1000}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_started
    command: python -m indo_usa_mcp.web

  # Daily pg_dump to ./backups (gzipped), keeping the 14 most recent. Always on.
  backup:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-diaspora}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backups:/backups
    entrypoint: ["sh", "-c"]
    command:
      - |
        while true; do
          ts=$$(date +%Y%m%d_%H%M%S)
          pg_dump -h db -U diaspora -d diaspora | gzip > /backups/diaspora_$$ts.sql.gz \
            && echo "backup written: diaspora_$$ts.sql.gz" \
            || echo "backup FAILED at $$ts"
          ls -1t /backups/diaspora_*.sql.gz 2>/dev/null | tail -n +15 | xargs -r rm -f
          sleep 86400
        done

  # Opt-in HTTPS reverse proxy (free Let's Encrypt). Enable with: --profile tls
  # Requires DOMAIN set to a hostname pointed at this VPS. Without it, the MCP server
  # is reachable on :8000 over plain HTTP (restrict via firewall).
  caddy:
    image: caddy:2
    restart: unless-stopped
    profiles: ["tls"]
    # Use public resolvers — some hosts' /etc/resolv.conf points at a loopback stub (127.0.0.53)
    # that isn't reachable inside the container, which breaks the ACME (Let's Encrypt) lookup.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN to your hostname to use the tls profile}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - web

  # Opt-in self-hosted LLM for the /chat assistant (free). Enable with: --profile llm
  # After it's up:  docker compose -f docker-compose.prod.yml exec ollama ollama pull gemma2:2b
  # Then set LLM_PROVIDER=llm in .env (LLM_MODEL=gemma2:2b, LLM_USE_TOOLS=false already default).
  # CPU-only; no GPU needed. A 2B model wants ~3-4GB free RAM — check your VPS before enabling.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["llm"]
    volumes:
      - ollama_models:/root/.ollama
    # Not published to the host; only the web service reaches it over the compose network.
    expose:
      - "11434"

volumes:
  diaspora_pgdata:
  caddy_data:
  caddy_config:
  ollama_models:

networks:
  default:
  # Shared with the caterbid stack's front nginx so it can reverse-proxy this app over HTTPS.
  # External: created/owned by the caterbid compose project (must exist before `up`).
  caterbid:
    external: true
    name: catering-bid_web
