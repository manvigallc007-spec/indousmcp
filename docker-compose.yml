services:
  db:
    image: pgvector/pgvector:pg16
    container_name: diaspora-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: diaspora
      POSTGRES_PASSWORD: diaspora
      POSTGRES_DB: diaspora
    # Host port 5433 to avoid colliding with a pre-existing native Postgres on 5432.
    ports:
      - "5433:5432"
    volumes:
      - diaspora_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diaspora -d diaspora"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  diaspora_pgdata:
